<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에란겔 Full-Screen 전술 측량 지도</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050b14;
            font-family: 'Consolas', 'Segoe UI', monospace;
            color: #00ffcc;
        }

        /* Fullscreen Map Container */
        #map-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        svg {
            width: 100%; height: 100%;
            cursor: crosshair;
            touch-action: none;
        }
        svg.panning { cursor: grabbing; }

        /* Top Compass Rose & North Indicator */
        #top-bar {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid #00ffcc;
            padding: 8px 25px;
            border-radius: 20px;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            pointer-events: none;
            z-index: 10;
        }
        .compass-dial {
            font-weight: bold; font-size: 14px; letter-spacing: 2px;
        }
        .hint-text {
            font-size: 10px; color: #7fffdd; letter-spacing: 0.5px; opacity: 0.85;
        }

        /* Bottom Status & Measurement Panel */
        #bottom-bar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 1100px;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid #00ffcc;
            border-radius: 8px;
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .data-group { display: flex; gap: 25px; align-items: center; flex-wrap: wrap; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .data-val { font-size: 16px; font-weight: bold; color: #fff; }

        /* Scale Bar UI */
        .scale-container { display: flex; flex-direction: column; align-items: flex-end; }
        .scale-bar {
            width: 100px; height: 6px;
            border: 1px solid #00ffcc; border-top: none;
            margin-bottom: 4px; position: relative;
        }
        .scale-bar::before {
            content: ''; position: absolute; left: 50%; top: 0;
            width: 1px; height: 100%; background: #00ffcc;
        }
        .scale-text { font-size: 11px; color: #00ffcc; }

        /* Reset Floating Button */
        #reset-btn {
            position: absolute; top: 15px; right: 20px;
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid #ff3366; color: #ff3366;
            padding: 8px 15px; border-radius: 4px;
            font-weight: bold; cursor: pointer; z-index: 10;
        }
        #reset-btn:hover { background: #ff3366; color: #fff; }

        /* Zoom Controls */
        #zoom-controls {
            position: absolute; right: 20px; top: 50%;
            transform: translateY(-50%);
            display: flex; flex-direction: column; gap: 6px;
            z-index: 10;
        }
        #zoom-controls button {
            width: 38px; height: 38px;
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid #00ffcc; color: #00ffcc;
            font-size: 18px; font-weight: bold; cursor: pointer;
            border-radius: 4px;
        }
        #zoom-controls button:hover { background: #00ffcc; color: #050b14; }
        #zoom-controls #zoom-view-reset { font-size: 13px; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="compass-dial">W ◄─── N (360° / 0mils) ───► E</div>
    <div class="hint-text">휠: 확대/축소 · 드래그: 이동 · 클릭: 좌표 찍기(A→B)</div>
</div>

<button id="reset-btn" onclick="resetPoints()">측정 초기화</button>

<div id="zoom-controls">
    <button id="zoom-in" title="확대">+</button>
    <button id="zoom-out" title="축소">−</button>
    <button id="zoom-view-reset" title="전체 보기">⤢</button>
</div>

<div id="map-container">
    <svg id="tactical-map" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <!-- Erangel Map Background -->
        <image id="map-bg" href="https://i.namu.wiki/i/f6asAE-P2PFd6mjvkf4CsiHL124RyIB_GQGpdx5ji2eDI76JdxanQFujfTbrmp_6bkreEaMmOYPs2eShzTc8Fm5RllnZkVIzFEafrcjRE25VPxr7o76OiceMLHmypetDL50Q7qf6E-73jv4fs2tRjw.webp" width="800" height="800" preserveAspectRatio="none"/>

        <!-- 100m Fine Reference Mesh (always visible) -->
        <g id="sub-grid" stroke="rgba(0, 255, 204, 0.15)" stroke-width="0.5"></g>

        <!-- Zoom-dependent Major Grid (4 / 8 / 16 / 32 steps) -->
        <g id="major-grid" stroke="#00ffcc" stroke-width="1.2" opacity="0.6"></g>

        <!-- Major Grid Labels -->
        <g id="grid-labels" fill="#00ffcc" font-size="10" font-weight="bold"></g>

        <!-- Measurement Graphics Layer -->
        <g id="measure-layer"></g>
    </svg>
</div>

<div id="bottom-bar">
    <div class="data-group">
        <div class="data-item">
            <span class="data-label">커서 좌표 (MGRS)</span>
            <span class="data-val" id="cursor-pos" style="color: #00ffcc;">0000 0000</span>
        </div>
        <div class="data-item">
            <span class="data-label">격자 단계</span>
            <span class="data-val" id="grid-step" style="color: #7fffdd;">4×4</span>
        </div>
        <div class="data-item">
            <span class="data-label">A 지점</span>
            <span class="data-val" id="pt-a">미지정</span>
        </div>
        <div class="data-item">
            <span class="data-label">B 지점</span>
            <span class="data-val" id="pt-b">미지정</span>
        </div>
        <div class="data-item">
            <span class="data-label">직선 거리</span>
            <span class="data-val" id="calc-dist" style="color: #ffcc00;">-</span>
        </div>
        <div class="data-item">
            <span class="data-label">방위각</span>
            <span class="data-val" id="calc-azimuth" style="color: #ffcc00;">-</span>
        </div>
        <div class="data-item">
            <span class="data-label">고도차 / 경사</span>
            <span class="data-val" id="calc-elevation" style="color: #ff3366;">-</span>
        </div>
    </div>

    <!-- Scale Bar -->
    <div class="scale-container">
        <div class="scale-bar" id="scale-bar"></div>
        <div class="scale-text" id="scale-text">2 km (주격자 1칸)</div>
    </div>
</div>

<script>
    const svg = document.getElementById('tactical-map');
    const majorGrid = document.getElementById('major-grid');
    const subGrid = document.getElementById('sub-grid');
    const gridLabels = document.getElementById('grid-labels');
    const measureLayer = document.getElementById('measure-layer');
    const gridStepEl = document.getElementById('grid-step');
    const scaleTextEl = document.getElementById('scale-text');
    const scaleBarEl = document.getElementById('scale-bar');

    const WORLD = 800;           // full map extent in SVG world units
    const MIN_VB = WORLD / 16;   // deepest zoom-in (scale 16x)
    const MAX_VB = WORLD;        // fully zoomed-out (scale 1x)

    // viewBox state -- the "camera" window into the 800x800 world
    let vb = { x: 0, y: 0, w: WORLD, h: WORLD };
    let currentStep = null; // 4, 8, 16 or 32

    let pointA = null;
    let pointB = null;

    // Panning / click-vs-drag state
    let isPointerDown = false;
    let dragMoved = false;
    let dragStartClient = null;
    let dragStartVB = null;

    // Fixed 100m fine mesh (drawn once, independent of zoom level)
    function initSubGrid() {
        let subHtml = '';
        for (let i = 0; i <= WORLD; i += 10) {
            if (i % 100 !== 0) {
                subHtml += `<line x1="${i}" y1="0" x2="${i}" y2="${WORLD}" />`;
                subHtml += `<line x1="0" y1="${i}" x2="${WORLD}" y2="${i}" />`;
            }
        }
        subGrid.innerHTML = subHtml;
    }

    // Determine grid density tier from current zoom scale
    // scale ~1 (fully zoomed out) -> 4 divisions
    // scale ~2                    -> 8 divisions
    // scale ~4                    -> 16 divisions
    // scale >=8                   -> 32 divisions (max detail)
    function getGridStep(vbWidth) {
        const scale = WORLD / vbWidth;
        if (scale < 2) return 4;
        if (scale < 4) return 8;
        if (scale < 8) return 16;
        return 32;
    }

    function formatLabel(worldUnits) {
        const meters = Math.round(worldUnits * 10);
        if (meters === 0) return '0';
        if (meters % 1000 === 0) return `${meters / 1000}km`;
        if (meters >= 1000) return `${(meters / 1000).toFixed(1)}km`;
        return `${meters}m`;
    }

    // Rebuild the major grid lines/labels only when the step tier changes
    function rebuildMajorGrid(step) {
        currentStep = step;
        const cell = WORLD / step;
        let majorHtml = '';
        let labelHtml = '';

        const off = cell * 0.06; // keeps label offset proportional to the current cell size
        for (let i = 0; i <= WORLD; i += cell) {
            majorHtml += `<line x1="${i}" y1="0" x2="${i}" y2="${WORLD}" />`;
            majorHtml += `<line x1="0" y1="${i}" x2="${WORLD}" y2="${i}" />`;
            if (i < WORLD) {
                labelHtml += `<text x="${i + off}" y="${off * 2}">${formatLabel(i)}</text>`;
                labelHtml += `<text x="${off}" y="${i + off * 2}">${formatLabel(i)}</text>`;
            }
        }
        majorGrid.innerHTML = majorHtml;
        gridLabels.innerHTML = labelHtml;
        gridStepEl.innerText = `${step}×${step}`;
    }

    // Convert SVG world Coordinates to MGRS (10m precision, unaffected by zoom)
    function pxToMGRS(x, y) {
        let easting = Math.floor(x * 10).toString().padStart(4, '0');
        let northing = Math.floor((WORLD - y) * 10).toString().padStart(4, '0');
        return `${easting} ${northing}`;
    }

    // Estimate Terrain Altitude (Simulated Topographic Profile for Erangel)
    function estimateAltitude(x, y) {
        // High altitude zones: Stalber, Sosnovka Mountain, Rozhok Hills
        let distStalber = Math.hypot(x - 650, y - 150);
        let distMiliHill = Math.hypot(x - 500, y - 700);
        let distGatkaPlains = Math.hypot(x - 250, y - 450);

        let alt = 15; // Sea-level baseline
        if (distStalber < 150) alt += (150 - distStalber) * 1.8;
        if (distMiliHill < 120) alt += (120 - distMiliHill) * 1.4;
        if (distGatkaPlains < 100) alt -= 10;

        return Math.max(2, Math.round(alt));
    }

    // Screen (client) px -> World (SVG) coordinates, honoring current viewBox
    function screenToWorld(clientX, clientY) {
        const rect = svg.getBoundingClientRect();
        return {
            x: vb.x + (clientX - rect.left) / rect.width * vb.w,
            y: vb.y + (clientY - rect.top) / rect.height * vb.h
        };
    }

    function clamp(val, min, max) { return Math.min(Math.max(val, min), max); }

    function clampViewBox() {
        vb.w = clamp(vb.w, MIN_VB, MAX_VB);
        vb.h = vb.w;
        vb.x = clamp(vb.x, 0, WORLD - vb.w);
        vb.y = clamp(vb.y, 0, WORLD - vb.h);
    }

    // Apply viewBox to the SVG and refresh everything that depends on zoom scale
    function applyViewBox() {
        svg.setAttribute('viewBox', `${vb.x} ${vb.y} ${vb.w} ${vb.h}`);

        const k = vb.w / WORLD; // world-unit scale factor to keep on-screen sizes stable
        majorGrid.setAttribute('stroke-width', (1.2 * k).toFixed(3));
        subGrid.setAttribute('stroke-width', (0.5 * k).toFixed(3));
        gridLabels.setAttribute('font-size', (10 * k).toFixed(2));

        const step = getGridStep(vb.w);
        if (step !== currentStep) rebuildMajorGrid(step);

        renderMeasure(k);
        updateScaleUI();
    }

    // Zoom in/out, keeping the given world point fixed under the cursor
    function zoomAt(worldX, worldY, factor) {
        const newW = clamp(vb.w * factor, MIN_VB, MAX_VB);
        const ratio = newW / vb.w;
        vb.x = worldX - (worldX - vb.x) * ratio;
        vb.y = worldY - (worldY - vb.y) * ratio;
        vb.w = newW;
        vb.h = newW;
        clampViewBox();
        applyViewBox();
    }

    function zoomAtCenter(factor) {
        zoomAt(vb.x + vb.w / 2, vb.y + vb.h / 2, factor);
    }

    function resetView() {
        vb = { x: 0, y: 0, w: WORLD, h: WORLD };
        applyViewBox();
    }

    // Mouse wheel zoom, centered on cursor
    svg.addEventListener('wheel', (e) => {
        e.preventDefault();
        const world = screenToWorld(e.clientX, e.clientY);
        const factor = e.deltaY < 0 ? 0.85 : 1 / 0.85;
        zoomAt(world.x, world.y, factor);
    }, { passive: false });

    document.getElementById('zoom-in').addEventListener('click', () => zoomAtCenter(0.7));
    document.getElementById('zoom-out').addEventListener('click', () => zoomAtCenter(1 / 0.7));
    document.getElementById('zoom-view-reset').addEventListener('click', resetView);

    // Pointer down: could become either a pan (drag) or a click (place point)
    svg.addEventListener('mousedown', (e) => {
        isPointerDown = true;
        dragMoved = false;
        dragStartClient = { x: e.clientX, y: e.clientY };
        dragStartVB = { x: vb.x, y: vb.y };
    });

    svg.addEventListener('mousemove', (e) => {
        if (isPointerDown) {
            const rect = svg.getBoundingClientRect();
            const dxScreen = e.clientX - dragStartClient.x;
            const dyScreen = e.clientY - dragStartClient.y;
            if (!dragMoved && Math.hypot(dxScreen, dyScreen) > 4) {
                dragMoved = true;
                svg.classList.add('panning');
            }
            if (dragMoved) {
                vb.x = dragStartVB.x - dxScreen * (vb.w / rect.width);
                vb.y = dragStartVB.y - dyScreen * (vb.h / rect.height);
                clampViewBox();
                applyViewBox();
            }
        }

        const world = screenToWorld(e.clientX, e.clientY);
        document.getElementById('cursor-pos').innerText = pxToMGRS(world.x, world.y);
    });

    window.addEventListener('mouseup', (e) => {
        if (!isPointerDown) return;
        isPointerDown = false;
        svg.classList.remove('panning');

        if (!dragMoved) {
            handlePointClick(e);
        }
    });

    // Click (no drag) -> pick measurement points
    function handlePointClick(e) {
        const { x, y } = screenToWorld(e.clientX, e.clientY);

        if (!pointA) {
            pointA = { x, y, mgrs: pxToMGRS(x, y), alt: estimateAltitude(x, y) };
            document.getElementById('pt-a').innerText = pointA.mgrs;
        } else if (!pointB) {
            pointB = { x, y, mgrs: pxToMGRS(x, y), alt: estimateAltitude(x, y) };
            document.getElementById('pt-b').innerText = pointB.mgrs;
        } else {
            // Re-select A
            pointA = { x, y, mgrs: pxToMGRS(x, y), alt: estimateAltitude(x, y) };
            pointB = null;
            document.getElementById('pt-a').innerText = pointA.mgrs;
            document.getElementById('pt-b').innerText = "미지정";
        }
        renderMeasure(vb.w / WORLD);
        updateMeasurement();
    }

    // Update Distance/Azimuth/Elevation Calculations
    function updateMeasurement() {
        if (pointA && pointB) {
            let dx = (pointB.x - pointA.x) * 10;
            let dy = (pointA.y - pointB.y) * 10; // Invert SVG Y-axis

            let dist2D = Math.sqrt(dx * dx + dy * dy);
            let dAlt = pointB.alt - pointA.alt;
            let dist3D = Math.sqrt(dist2D * dist2D + dAlt * dAlt);

            let angle = Math.atan2(dx, dy) * (180 / Math.PI);
            if (angle < 0) angle += 360;

            let slope = (dAlt / dist2D) * 100;

            document.getElementById('calc-dist').innerText = `${dist3D.toFixed(0)}m`;
            document.getElementById('calc-azimuth').innerText = `${angle.toFixed(1)}°`;

            let elevationText = `${dAlt >= 0 ? '+' : ''}${dAlt}m (${slope.toFixed(1)}%)`;
            document.getElementById('calc-elevation').innerText = elevationText;
        } else {
            document.getElementById('calc-dist').innerText = "-";
            document.getElementById('calc-azimuth').innerText = "-";
            document.getElementById('calc-elevation').innerText = "-";
        }
    }

    // Redraw point markers / distance line, sized to stay legible at any zoom level
    function renderMeasure(k) {
        let html = '';

        if (pointA) {
            html += `<circle cx="${pointA.x}" cy="${pointA.y}" r="${6 * k}" fill="#00ffcc" stroke="#ffffff" stroke-width="${1.5 * k}"/>`;
            html += `<text x="${pointA.x + 8 * k}" y="${pointA.y - 8 * k}" fill="#00ffcc" font-size="${12 * k}" font-weight="bold">A (${pointA.alt}m)</text>`;
        }

        if (pointB) {
            html += `<circle cx="${pointB.x}" cy="${pointB.y}" r="${6 * k}" fill="#ffcc00" stroke="#ffffff" stroke-width="${1.5 * k}"/>`;
            html += `<text x="${pointB.x + 8 * k}" y="${pointB.y - 8 * k}" fill="#ffcc00" font-size="${12 * k}" font-weight="bold">B (${pointB.alt}m)</text>`;
        }

        if (pointA && pointB) {
            html += `<line x1="${pointA.x}" y1="${pointA.y}" x2="${pointB.x}" y2="${pointB.y}" stroke="#ffcc00" stroke-width="${2 * k}" stroke-dasharray="${4 * k},${4 * k}"/>`;
        }

        measureLayer.innerHTML = html;
    }

    function resetPoints() {
        pointA = null;
        pointB = null;
        measureLayer.innerHTML = '';
        document.getElementById('pt-a').innerText = "미지정";
        document.getElementById('pt-b').innerText = "미지정";
        document.getElementById('calc-dist').innerText = "-";
        document.getElementById('calc-azimuth').innerText = "-";
        document.getElementById('calc-elevation').innerText = "-";
    }

    // Scale bar reflects the real-world size of one current major grid cell
    function updateScaleUI() {
        const rect = svg.getBoundingClientRect();
        const cellWorldUnits = WORLD / currentStep;
        const cellMeters = cellWorldUnits * 10;

        scaleTextEl.innerText = `${formatLabel(cellWorldUnits)} (주격자 1칸)`;

        const barPx = (cellWorldUnits / vb.w) * rect.width;
        scaleBarEl.style.width = `${clamp(barPx, 20, 200)}px`;
    }

    initSubGrid();
    applyViewBox();
</script>
</body>
</html>
