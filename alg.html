<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>에란겔 Full-Screen 전술 측량 지도</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html {
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #050b14;
            font-family: 'Consolas', 'Segoe UI', monospace;
            color: #00ffcc;
        }

        /* Fullscreen Map Container */
        #map-container {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        svg {
            width: 100%; height: 100%;
            cursor: crosshair;
        }

        /* Top Compass Rose & North Indicator */
        #top-bar {
            position: absolute;
            top: 15px; left: 50%;
            transform: translateX(-50%);
            background: rgba(13, 17, 23, 0.85);
            border: 1px solid #00ffcc;
            padding: 8px 25px;
            border-radius: 20px;
            display: flex; align-items: center; gap: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            pointer-events: none;
            z-index: 10;
        }
        .compass-dial {
            font-weight: bold; font-size: 14px; letter-spacing: 2px;
        }

        /* Bottom Status & Measurement Panel */
        #bottom-bar {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 90%; max-width: 1000px;
            background: rgba(13, 17, 23, 0.9);
            border: 1px solid #00ffcc;
            border-radius: 8px;
            padding: 12px 20px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .data-group { display: flex; gap: 25px; align-items: center; }
        .data-item { display: flex; flex-direction: column; }
        .data-label { font-size: 10px; color: #888; text-transform: uppercase; }
        .data-val { font-size: 16px; font-weight: bold; color: #fff; }

        /* Scale Bar UI */
        .scale-container { display: flex; flex-direction: column; align-items: flex-end; }
        .scale-bar {
            width: 100px; height: 6px;
            border: 1px solid #00ffcc; border-top: none;
            margin-bottom: 4px; position: relative;
        }
        .scale-bar::before {
            content: ''; position: absolute; left: 50%; top: 0;
            width: 1px; height: 100%; background: #00ffcc;
        }
        .scale-text { font-size: 11px; color: #00ffcc; }

        /* Reset Floating Button */
        #reset-btn {
            position: absolute; top: 15px; right: 20px;
            background: rgba(255, 51, 102, 0.2);
            border: 1px solid #ff3366; color: #ff3366;
            padding: 8px 15px; border-radius: 4px;
            font-weight: bold; cursor: pointer; z-index: 10;
        }
        #reset-btn:hover { background: #ff3366; color: #fff; }
    </style>
</head>
<body>

<div id="top-bar">
    <div class="compass-dial">W ◄─── N (360° / 0mils) ───► E</div>
</div>

<button id="reset-btn" onclick="resetPoints()">측정 초기화</button>

<div id="map-container">
    <svg id="tactical-map" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
        <!-- Erangel Map Background -->
        <image id="map-bg" href="https://i.namu.wiki/i/f6asAE-P2PFd6mjvkf4CsiHL124RyIB_GQGpdx5ji2eDI76JdxanQFujfTbrmp_6bkreEaMmOYPs2eShzTc8Fm5RllnZkVIzFEafrcjRE25VPxr7o76OiceMLHmypetDL50Q7qf6E-73jv4fs2tRjw.webp" width="800" height="800" preserveAspectRatio="none"/>

        <!-- 100m Sub-Grid -->
        <g id="sub-grid" stroke="rgba(0, 255, 204, 0.15)" stroke-width="0.5"></g>

        <!-- 1km Major Grid (MGRS) -->
        <g id="major-grid" stroke="#00ffcc" stroke-width="1.2" opacity="0.6"></g>

        <!-- MGRS Grid Labels -->
        <g id="grid-labels" fill="#00ffcc" font-size="10" font-weight="bold"></g>

        <!-- Measurement Graphics Layer -->
        <g id="measure-layer"></g>
    </svg>
</div>

<div id="bottom-bar">
    <div class="data-group">
        <div class="data-item">
            <span class="data-label">커서 좌표 (MGRS 8계단)</span>
            <span class="data-val" id="cursor-pos" style="color: #00ffcc;">0000 0000</span>
        </div>
        <div class="data-item">
            <span class="data-label">A 지점</span>
            <span class="data-val" id="pt-a">미지정</span>
        </div>
        <div class="data-item">
            <span class="data-label">B 지점</span>
            <span class="data-val" id="pt-b">미지정</span>
        </div>
        <div class="data-item">
            <span class="data-label">직선 거리</span>
            <span class="data-val" id="calc-dist" style="color: #ffcc00;">-</span>
        </div>
        <div class="data-item">
            <span class="data-label">방위각</span>
            <span class="data-val" id="calc-azimuth" style="color: #ffcc00;">-</span>
        </div>
        <div class="data-item">
            <span class="data-label">고도차 / 경사</span>
            <span class="data-val" id="calc-elevation" style="color: #ff3366;">-</span>
        </div>
    </div>

    <!-- Scale Bar -->
    <div class="scale-container">
        <div class="scale-bar"></div>
        <div class="scale-text">1 km (주격자 1칸)</div>
    </div>
</div>

<script>
    const svg = document.getElementById('tactical-map');
    const majorGrid = document.getElementById('major-grid');
    const subGrid = document.getElementById('sub-grid');
    const gridLabels = document.getElementById('grid-labels');
    const measureLayer = document.getElementById('measure-layer');

    let pointA = null;
    let pointB = null;

    // Grid Initialization
    function initGrid() {
        let subHtml = '';
        let majorHtml = '';
        let labelHtml = '';

        for (let i = 0; i <= 800; i += 10) {
            if (i % 100 !== 0) {
                subHtml += `<line x1="${i}" y1="0" x2="${i}" y2="800" />`;
                subHtml += `<line x1="0" y1="${i}" x2="800" y2="${i}" />`;
            }
        }
        subGrid.innerHTML = subHtml;

        for (let i = 0; i <= 800; i += 100) {
            majorHtml += `<line x1="${i}" y1="0" x2="${i}" y2="800" />`;
            majorHtml += `<line x1="0" y1="${i}" x2="800" y2="${i}" />`;
            
            let val = (i / 100).toString().padStart(2, '0');
            if (i < 800) {
                labelHtml += `<text x="${i + 4}" y="14">${val}</text>`;
                labelHtml += `<text x="4" y="${i + 96}">${val}</text>`;
            }
        }
        majorGrid.innerHTML = majorHtml;
        gridLabels.innerHTML = labelHtml;
    }

    // Convert SVG Coordinates to MGRS
    function pxToMGRS(x, y) {
        let easting = Math.floor(x * 10).toString().padStart(4, '0');
        let northing = Math.floor((800 - y) * 10).toString().padStart(4, '0');
        return `${easting} ${northing}`;
    }

    // Estimate Terrain Altitude (Simulated Topographic Profile for Erangel)
    function estimateAltitude(x, y) {
        // High altitude zones: Stalber, Sosnovka Mountain, Rozhok Hills
        let distStalber = Math.hypot(x - 650, y - 150);
        let distMiliHill = Math.hypot(x - 500, y - 700);
        let distGatkaPlains = Math.hypot(x - 250, y - 450);

        let alt = 15; // Sea-level baseline
        if (distStalber < 150) alt += (150 - distStalber) * 1.8;
        if (distMiliHill < 120) alt += (120 - distMiliHill) * 1.4;
        if (distGatkaPlains < 100) alt -= 10;

        return Math.max(2, Math.round(alt));
    }

    // Mouse Move Event
    svg.addEventListener('mousemove', (e) => {
        const rect = svg.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (800 / rect.width);
        const y = (e.clientY - rect.top) * (800 / rect.height);
        document.getElementById('cursor-pos').innerText = pxToMGRS(x, y);
    });

    // Click Event to Pick Points
    svg.addEventListener('click', (e) => {
        const rect = svg.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (800 / rect.width);
        const y = (e.clientY - rect.top) * (800 / rect.height);

        if (!pointA) {
            pointA = { x, y, mgrs: pxToMGRS(x, y), alt: estimateAltitude(x, y) };
            document.getElementById('pt-a').innerText = pointA.mgrs;
        } else if (!pointB) {
            pointB = { x, y, mgrs: pxToMGRS(x, y), alt: estimateAltitude(x, y) };
            document.getElementById('pt-b').innerText = pointB.mgrs;
        } else {
            // Re-select A
            pointA = { x, y, mgrs: pxToMGRS(x, y), alt: estimateAltitude(x, y) };
            pointB = null;
            document.getElementById('pt-a').innerText = pointA.mgrs;
            document.getElementById('pt-b').innerText = "미지정";
        }
        updateMeasurement();
    });

    // Update Measurement Calculations & Overlay Render
    function updateMeasurement() {
        let html = '';

        if (pointA) {
            html += `<circle cx="${pointA.x}" cy="${pointA.y}" r="6" fill="#00ffcc" stroke="#ffffff" stroke-width="1.5"/>`;
            html += `<text x="${pointA.x + 8}" y="${pointA.y - 8}" fill="#00ffcc" font-size="12" font-weight="bold">A (${pointA.alt}m)</text>`;
        }

        if (pointB) {
            html += `<circle cx="${pointB.x}" cy="${pointB.y}" r="6" fill="#ffcc00" stroke="#ffffff" stroke-width="1.5"/>`;
            html += `<text x="${pointB.x + 8}" y="${pointB.y - 8}" fill="#ffcc00" font-size="12" font-weight="bold">B (${pointB.alt}m)</text>`;
        }

        if (pointA && pointB) {
            // Distance Line
            html += `<line x1="${pointA.x}" y1="${pointA.y}" x2="${pointB.x}" y2="${pointB.y}" stroke="#ffcc00" stroke-width="2" stroke-dasharray="4,4"/>`;

            let dx = (pointB.x - pointA.x) * 10;
            let dy = (pointA.y - pointB.y) * 10; // Invert SVG Y-axis

            let dist2D = Math.sqrt(dx * dx + dy * dy);
            let dAlt = pointB.alt - pointA.alt;
            let dist3D = Math.sqrt(dist2D * dist2D + dAlt * dAlt);

            let angle = Math.atan2(dx, dy) * (180 / Math.PI);
            if (angle < 0) angle += 360;

            let slope = (dAlt / dist2D) * 100;

            document.getElementById('calc-dist').innerText = `${dist3D.toFixed(0)}m`;
            document.getElementById('calc-azimuth').innerText = `${angle.toFixed(1)}°`;
            
            let elevationText = `${dAlt >= 0 ? '+' : ''}${dAlt}m (${slope.toFixed(1)}%)`;
            document.getElementById('calc-elevation').innerText = elevationText;
        } else {
            document.getElementById('calc-dist').innerText = "-";
            document.getElementById('calc-azimuth').innerText = "-";
            document.getElementById('calc-elevation').innerText = "-";
        }

        measureLayer.innerHTML = html;
    }

    function resetPoints() {
        pointA = null;
        pointB = null;
        measureLayer.innerHTML = '';
        document.getElementById('pt-a').innerText = "미지정";
        document.getElementById('pt-b').innerText = "미지정";
        document.getElementById('calc-dist').innerText = "-";
        document.getElementById('calc-azimuth').innerText = "-";
        document.getElementById('calc-elevation').innerText = "-";
    }

    initGrid();
</script>
</body>
</html>
