<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>High-Performance GPU Path Tracer</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #111; font-family: sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui-container { position: absolute; top: 10px; left: 10px; color: #fff; text-shadow: 1px 1px 2px #000; pointer-events: none; z-index: 10; }
        #file-input { display: none; }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-gpu-pathtracer": "https://unpkg.com/three-gpu-pathtracer@0.0.21/build/index.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui-container">
        <h2>Web GPU Raytracer</h2>
        <p id="samples-info">Samples: 0</p>
    </div>
    <input type="file" id="file-input" accept=".gltf,.glb,.obj" />

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
        import GUI from 'lil-gui';
        import { computeBoundsTree, disposeBoundsTree } from 'three-mesh-bvh';
        import { PathTracingRenderer, PhysicalPathTracingMaterial, PathTracingSceneGenerator } from 'three-gpu-pathtracer';

        // [수정 완료] 전역 window 객체에 THREE를 강제로 바인딩
        window.THREE = THREE;

        // BVH 최적화 함수 주입
        THREE.BufferGeometry.prototype.computeBoundsTree = computeBoundsTree;
        THREE.BufferGeometry.prototype.disposeBoundsTree = disposeBoundsTree;

        let camera, scene, renderer, ptRenderer, ptSceneGenerator;
        let displayScene, displayCamera, displayMesh;
        let orbitControls, fpsControls;
        let lightModel, pointLight;
        
        // 렌더링 데이터
        let sceneMeshes = [];
        let renderNeedsUpdate = false;

        // GUI 파라미터
        const params = {
            bounces: 3,
            lightColor: '#ffffff',
            lightIntensity: 5.0,
            lightX: 5,
            lightY: 5,
            lightZ: 5,
            cameraMode: 'Orbit (Plane)',
            addSphere: () => addPrimitive('sphere'),
            addBox: () => addPrimitive('box'),
            loadModel: () => document.getElementById('file-input').click()
        };

        init();
        animate();

        function init() {
            // 1. 렌더러 설정 (성능 최적화 포함)
            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            // 2. 카메라 설정
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 10);

            // 3. 패스트레이싱 렌더러 설정 (축적형)
            ptRenderer = new PathTracingRenderer(renderer);
            ptRenderer.camera = camera;
            ptRenderer.material = new PhysicalPathTracingMaterial();
            ptRenderer.tiles.set(2, 2);
            ptRenderer.setSize(window.innerWidth, window.innerHeight);

            // ✅ PathTracingSceneGenerator에 객체들을 설정
            ptSceneGenerator = new PathTracingSceneGenerator();
            ptSceneGenerator.generateBVH = true;

            // 카메라 컨트롤 (Plane / FPS)
            orbitControls = new OrbitControls(camera, renderer.domElement);
            orbitControls.target.set(0, 0, 0);
            orbitControls.addEventListener('change', resetPathTracer);

            fpsControls = new PointerLockControls(camera, document.body);
            fpsControls.addEventListener('change', resetPathTracer);

            // 4. 씬 & 기본 환경 구성
            scene = new THREE.Scene();
            
            // 바닥 평면 (Plane)
            const floorGeo = new THREE.BoxGeometry(20, 0.1, 20);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.1, metalness: 0.0 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.position.y = -0.05;
            sceneMeshes.push(floor);

            // 광원 표시용 구체
            const lightGeo = new THREE.SphereGeometry(0.5, 32, 32);
            const lightMat = new THREE.MeshBasicMaterial({ color: params.lightColor });
            lightModel = new THREE.Mesh(lightGeo, lightMat);
            updateLightPosition();
            scene.add(lightModel);
            
            // ✅ 실제 포인트 라이트도 추가 (패스트레이서 렌더링용)
            pointLight = new THREE.PointLight(params.lightColor, params.lightIntensity, 100);
            pointLight.position.copy(lightModel.position);
            scene.add(pointLight);

            // 5. GUI 구성
            setupGUI();

            // 6. 파일 로더 이벤트 리스너
            document.getElementById('file-input').addEventListener('change', handleFileUpload);

            // 7. 리사이즈 이벤트
            window.addEventListener('resize', onWindowResize);

            // 8. 화면 표시용 풀스크린 쿼드 (ptRenderer target → canvas)
            displayCamera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
            displayScene = new THREE.Scene();
            displayMesh = new THREE.Mesh(
                new THREE.PlaneGeometry(2, 2),
                new THREE.MeshBasicMaterial({ map: ptRenderer.target.texture })
            );
            displayMesh.frustumCulled = false;
            displayScene.add(displayMesh);

            // 초기 BVH 빌드
            updatePTScene();
        }

        // 광원 위치 및 색상 업데이트
        function updateLightPosition() {
            lightModel.position.set(params.lightX, params.lightY, params.lightZ);
            lightModel.material.color.set(new THREE.Color(params.lightColor));
            if (pointLight) {
                pointLight.position.set(params.lightX, params.lightY, params.lightZ);
                pointLight.color.set(new THREE.Color(params.lightColor));
                pointLight.intensity = params.lightIntensity;
            }
            renderNeedsUpdate = true;
        }

        // 도형 즉각 추가 로직
        function addPrimitive(type) {
            let geo;
            if (type === 'sphere') geo = new THREE.SphereGeometry(1, 32, 32);
            else if (type === 'box') geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            
            const mat = new THREE.MeshStandardMaterial({
                color: Math.random() * 0xffffff,
                roughness: Math.random(),
                metalness: Math.random()
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.random() - 0.5) * 10, 1 + Math.random() * 2, (Math.random() - 0.5) * 10);
            
            sceneMeshes.push(mesh);
            renderNeedsUpdate = true;
        }

        // 3D 모델(GLTF/OBJ) 로드 로직
        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const extension = file.name.split('.').pop().toLowerCase();

            const onLoad = (object) => {
                const model = object.scene || object;
                const box = new THREE.Box3().setFromObject(model);
                const center = box.getCenter(new THREE.Vector3());
                const size = box.getSize(new THREE.Vector3());
                const maxDim = Math.max(size.x, size.y, size.z);
                
                model.scale.setScalar(5 / maxDim);
                model.position.sub(center.multiplyScalar(5 / maxDim));
                model.position.y += 2.5;

                model.traverse((child) => {
                    if (child.isMesh) {
                        if(child.material) {
                            child.material.roughness = 0.2; // 반사 효과를 잘 보기 위해
                        }
                        sceneMeshes.push(child);
                    }
                });
                
                renderNeedsUpdate = true;
                URL.revokeObjectURL(url);
            };

            if (extension === 'gltf' || extension === 'glb') {
                new GLTFLoader().load(url, onLoad);
            } else if (extension === 'obj') {
                new OBJLoader().load(url, onLoad);
            }
        }

        // GPU로 씬 데이터를 넘기고 BVH 생성
        function updatePTScene() {
            document.getElementById('samples-info').innerText = "Building BVH...";
            
            const group = new THREE.Group();
            sceneMeshes.forEach(m => group.add(m.clone()));
            
            const emissiveMat = new THREE.MeshStandardMaterial({ 
                color: 0x000000, 
                emissive: new THREE.Color(params.lightColor), 
                emissiveIntensity: params.lightIntensity 
            });
            const lightClone = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), emissiveMat);
            lightClone.position.copy(lightModel.position);
            group.add(lightClone);

            // ✅ 포인트 라이트를 group에 추가해야 path tracer가 라이트를 인식
            if (pointLight) {
                const ptLight = pointLight.clone();
                group.add(ptLight);
            }

            try {
                // ✅ 올바른 API: setObjects()로 객체 설정 후 generate() 호출
                ptSceneGenerator.setObjects(group);
                const result = ptSceneGenerator.generate();
                
                const { bvh, geometry, materials, textures, lights, iesTextures, bvhChanged } = result;
                const material = ptRenderer.material;
                
                if (bvh && geometry) {
                    // ✅ BVH & geometry 속성 업데이트 (항상 업데이트)
                    material.bvh.updateFrom(bvh);
                    material.attributesArray.updateFrom(
                        geometry.attributes.normal,
                        geometry.attributes.tangent,
                        geometry.attributes.uv,
                        geometry.attributes.color
                    );
                    material.materialIndexAttribute.updateFrom(geometry.attributes.materialIndex);

                    // ✅ 텍스처를 먼저 setTextures로 등록 후 materials 업데이트
                    const textureSize = 1024;
                    material.textures.setTextures(renderer, textures, textureSize, textureSize);
                    material.materials.updateFrom(materials, textures);

                    // ✅ 라이트 업데이트
                    material.lights.updateFrom(lights || [], iesTextures || []);

                    ptRenderer.bounces = params.bounces;
                    resetPathTracer();
                    document.getElementById('samples-info').innerText = "Samples: 0";
                    console.log('✅ BVH 생성 및 씬 업데이트 완료');
                } else {
                    console.warn('⚠️ BVH 또는 geometry를 찾을 수 없음');
                    document.getElementById('samples-info').innerText = "Error: No BVH generated";
                }
            } catch (error) {
                console.error('❌ BVH 생성 중 오류:', error);
                document.getElementById('samples-info').innerText = "Error: " + error.message;
            }
        }
        // 축적된 픽셀 초기화
        function resetPathTracer() {
            ptRenderer.reset();
        }

        // GUI 설정
        function setupGUI() {
            const gui = new GUI();
            
            const lightFolder = gui.addFolder('Light Settings');
            lightFolder.add(params, 'lightX', -10, 10).onChange(updateLightPosition);
            lightFolder.add(params, 'lightY', 1, 15).onChange(updateLightPosition);
            lightFolder.add(params, 'lightZ', -10, 10).onChange(updateLightPosition);
            lightFolder.addColor(params, 'lightColor').onChange(updateLightPosition);
            lightFolder.add(params, 'lightIntensity', 0, 20).onChange(updateLightPosition);
            
            const renderFolder = gui.addFolder('Render Settings');
            renderFolder.add(params, 'bounces', 1, 10, 1).onChange(() => { ptRenderer.bounces = params.bounces; resetPathTracer(); });
            
            const objectsFolder = gui.addFolder('Objects');
            objectsFolder.add(params, 'addSphere').name('Add Sphere');
            objectsFolder.add(params, 'addBox').name('Add Box');
            objectsFolder.add(params, 'loadModel').name('Load OBJ/GLTF');

            const cameraFolder = gui.addFolder('Camera');
            cameraFolder.add(params, 'cameraMode', ['Orbit (Plane)', 'FPS']).onChange(mode => {
                if (mode === 'FPS') {
                    orbitControls.enabled = false;
                    fpsControls.lock();
                } else {
                    fpsControls.unlock();
                    orbitControls.enabled = true;
                }
            });
        }

        // 화면 크기 조절 대응
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            ptRenderer.setSize(window.innerWidth, window.innerHeight);
            resetPathTracer();
        }

        // 메인 루프
        function animate() {
            requestAnimationFrame(animate);

            if (renderNeedsUpdate) {
                updatePTScene();
                renderNeedsUpdate = false;
            }

            // 카메라 행렬을 매 프레임 path tracer 셰이더에 전달 (필수!)
            camera.updateMatrixWorld();
            ptRenderer.setCamera(camera);

            // Path Tracer 업데이트 (매 프레임 축적)
            ptRenderer.update();

            // ptRenderer 결과를 화면에 표시
            renderer.setRenderTarget(null);
            renderer.render(displayScene, displayCamera);

            document.getElementById('samples-info').innerText = `Samples: ${Math.floor(ptRenderer.samples)}`;
        }
    </script>
</body>
</html>
