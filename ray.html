<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>WebGPU Path Tracer</title>
<style>
  html, body { margin: 0; height: 100%; background: #0b0d12; overflow: hidden; font-family: ui-monospace, Menlo, Consolas, monospace; color: #cfd6e4; }
  #c { width: 100vw; height: 100vh; display: block; }
  #err { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; flex-direction: column; gap: 14px; padding: 40px; text-align: center; background: #0b0d12; z-index: 100; }
  #err h1 { color: #ff6b6b; font-size: 22px; margin: 0; }
  #err p { max-width: 560px; line-height: 1.5; color: #9aa6bc; }
  #hud { position: fixed; left: 12px; top: 12px; display: flex; gap: 8px; flex-wrap: wrap; z-index: 10; pointer-events: none; }
  .chip { background: rgba(20,24,33,0.82); border: 1px solid rgba(120,140,180,0.25); border-radius: 999px; padding: 5px 12px; font-size: 12px; letter-spacing: 0.3px; backdrop-filter: blur(8px); }
  .chip b { color: #7fd1ff; font-weight: 600; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="chip">SPP <b id="hSpp">0</b></div>
  <div class="chip">FPS <b id="hFps">0</b></div>
  <div class="chip">RES <b id="hRes">-</b></div>
  <div class="chip" id="hStatus">init</div>
</div>
<div id="err">
  <h1>WebGPU not available</h1>
  <p>This path tracer requires WebGPU. Please use a recent version of Chrome or Edge (or another browser with WebGPU enabled). On Linux you may need to launch with <code>--enable-unsafe-webgpu</code>.</p>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
    "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import GUI from 'lil-gui';

const errEl = document.getElementById('err');
function fatal(title, msg) {
  errEl.style.display = 'flex';
  errEl.querySelector('h1').textContent = title;
  if (msg) errEl.querySelector('p').textContent = msg;
  throw new Error(title + (msg ? ': ' + msg : ''));
}

if (!navigator.gpu) fatal('WebGPU not available');

const canvas = document.getElementById('c');
const hSpp = document.getElementById('hSpp');
const hFps = document.getElementById('hFps');
const hRes = document.getElementById('hRes');
const hStatus = document.getElementById('hStatus');

// ---------------------------------------------------------------------------
// Device
// ---------------------------------------------------------------------------
const adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
if (!adapter) fatal('No WebGPU adapter');
const device = await adapter.requestDevice();
device.lost.then((info) => { if (info.reason !== 'destroyed') fatal('WebGPU device lost', info.message || ''); });

const ctx = canvas.getContext('webgpu');
const format = navigator.gpu.getPreferredCanvasFormat();
ctx.configure({ device, format, alphaMode: 'opaque' });

// ---------------------------------------------------------------------------
// Three.js (geometry helpers only)
// ---------------------------------------------------------------------------
const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1000);
camera.position.set(6, 4.2, 8);

const controls = new OrbitControls(camera, canvas);
controls.target.set(0, 1, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.update();

const scene = new THREE.Scene();
let triList = [];
let materials = [];
const materialMap = new Map();

function registerMaterial(mat) {
  if (materialMap.has(mat)) return materialMap.get(mat);
  const c = mat.color || { r: 0.8, g: 0.8, b: 0.8 };
  const e = mat.emissive || { r: 0, g: 0, b: 0 };
  const ei = (mat.emissiveIntensity ?? 1.0);
  const m = {
    baseColor: [c.r, c.g, c.b],
    metalness: mat.metalness ?? 0.0,
    roughness: Math.max(0.001, mat.roughness ?? 1.0),
    emission: [e.r * ei, e.g * ei, e.b * ei],
    transmission: mat.transmission ?? 0.0,
    ior: mat.ior ?? 1.5,
  };
  const idx = materials.length;
  materials.push(m);
  materialMap.set(mat, idx);
  return idx;
}

const _v0 = new THREE.Vector3(), _v1 = new THREE.Vector3(), _v2 = new THREE.Vector3();
const _n0 = new THREE.Vector3(), _n1 = new THREE.Vector3(), _n2 = new THREE.Vector3();
const _nm = new THREE.Matrix3();

function extractTriangles(mesh) {
  mesh.updateMatrixWorld(true);
  const geo = mesh.geometry;
  const mat = Array.isArray(mesh.material) ? mesh.material[0] : mesh.material;
  const matIdx = registerMaterial(mat);
  const pos = geo.attributes.position;
  if (!pos) return;
  const nrm = geo.attributes.normal;
  const idx = geo.index;
  const wm = mesh.matrixWorld;
  _nm.getNormalMatrix(wm);
  const count = idx ? idx.count : pos.count;
  const gi = (i) => idx ? idx.getX(i) : i;
  for (let i = 0; i < count; i += 3) {
    const a = gi(i), b = gi(i + 1), c = gi(i + 2);
    _v0.fromBufferAttribute(pos, a).applyMatrix4(wm);
    _v1.fromBufferAttribute(pos, b).applyMatrix4(wm);
    _v2.fromBufferAttribute(pos, c).applyMatrix4(wm);
    if (nrm) {
      _n0.fromBufferAttribute(nrm, a).applyMatrix3(_nm).normalize();
      _n1.fromBufferAttribute(nrm, b).applyMatrix3(_nm).normalize();
      _n2.fromBufferAttribute(nrm, c).applyMatrix3(_nm).normalize();
    } else {
      _n0.subVectors(_v1, _v0).cross(_n2.subVectors(_v2, _v0)).normalize();
      _n1.copy(_n0); _n2.copy(_n0);
    }
    triList.push({
      v0: [_v0.x, _v0.y, _v0.z], v1: [_v1.x, _v1.y, _v1.z], v2: [_v2.x, _v2.y, _v2.z],
      n0: [_n0.x, _n0.y, _n0.z], n1: [_n1.x, _n1.y, _n1.z], n2: [_n2.x, _n2.y, _n2.z],
      matIdx,
    });
  }
}

function buildDefaultScene() {
  triList = []; materials = []; materialMap.clear();
  while (scene.children.length) scene.remove(scene.children[0]);

  const floor = new THREE.Mesh(
    new THREE.BoxGeometry(40, 0.5, 40),
    new THREE.MeshStandardMaterial({ color: 0xb8bcc4, roughness: 0.08, metalness: 0.0 })
  );
  floor.position.y = -0.25;
  scene.add(floor);

  const mirror = new THREE.Mesh(
    new THREE.SphereGeometry(1.3, 64, 48),
    new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 1.0, roughness: 0.02 })
  );
  mirror.position.set(-3, 1.3, 0);
  scene.add(mirror);

  const gold = new THREE.Mesh(
    new THREE.SphereGeometry(1.3, 64, 48),
    new THREE.MeshStandardMaterial({ color: 0xffc864, metalness: 1.0, roughness: 0.18 })
  );
  gold.position.set(0, 1.3, 0);
  scene.add(gold);

  const glassMat = new THREE.MeshPhysicalMaterial({ color: 0xffffff, transmission: 1.0, ior: 1.5, roughness: 0.0, metalness: 0.0 });
  const glass = new THREE.Mesh(new THREE.SphereGeometry(1.3, 64, 48), glassMat);
  glass.position.set(3, 1.3, 0);
  scene.add(glass);

  const teal = new THREE.Mesh(
    new THREE.BoxGeometry(1.6, 1.6, 1.6),
    new THREE.MeshStandardMaterial({ color: 0x2f9e8f, roughness: 0.55, metalness: 0.0 })
  );
  teal.position.set(0.2, 0.8, -3.2);
  teal.rotation.y = 0.5;
  scene.add(teal);

  scene.traverse((o) => { if (o.isMesh) extractTriangles(o); });
}

// ---------------------------------------------------------------------------
// BVH (longest axis, centroid median split)
// ---------------------------------------------------------------------------
function buildBVH(tris) {
  const nodes = [];
  const order = tris.map((_, i) => i);
  const cent = tris.map((t) => [
    (t.v0[0] + t.v1[0] + t.v2[0]) / 3,
    (t.v0[1] + t.v1[1] + t.v2[1]) / 3,
    (t.v0[2] + t.v1[2] + t.v2[2]) / 3,
  ]);

  function triBounds(ti, mn, mx) {
    const t = tris[ti];
    for (const v of [t.v0, t.v1, t.v2]) {
      for (let k = 0; k < 3; k++) { mn[k] = Math.min(mn[k], v[k]); mx[k] = Math.max(mx[k], v[k]); }
    }
  }

  function build(start, end, depth) {
    const ni = nodes.length;
    const mn = [Infinity, Infinity, Infinity], mx = [-Infinity, -Infinity, -Infinity];
    for (let i = start; i < end; i++) triBounds(order[i], mn, mx);
    const node = { mn, mx, leftFirst: start, triCount: end - start };
    nodes.push(node);

    const n = end - start;
    if (n <= 4 || depth >= 24) return ni;

    const cmn = [Infinity, Infinity, Infinity], cmx = [-Infinity, -Infinity, -Infinity];
    for (let i = start; i < end; i++) {
      const c = cent[order[i]];
      for (let k = 0; k < 3; k++) { cmn[k] = Math.min(cmn[k], c[k]); cmx[k] = Math.max(cmx[k], c[k]); }
    }
    let axis = 0;
    let ext = cmx[0] - cmn[0];
    if (cmx[1] - cmn[1] > ext) { ext = cmx[1] - cmn[1]; axis = 1; }
    if (cmx[2] - cmn[2] > ext) { ext = cmx[2] - cmn[2]; axis = 2; }
    if (ext <= 1e-9) return ni;

    const mid = (cmn[axis] + cmx[axis]) * 0.5;
    let i = start, j = end - 1;
    while (i <= j) {
      if (cent[order[i]][axis] < mid) i++;
      else { const tmp = order[i]; order[i] = order[j]; order[j] = tmp; j--; }
    }
    let split = i;
    if (split === start || split === end) split = (start + end) >> 1;

    node.triCount = 0;
    const left = build(start, split, depth + 1);
    build(split, end, depth + 1);
    node.leftFirst = left;
    return ni;
  }

  if (tris.length > 0) build(0, tris.length, 0);
  else nodes.push({ mn: [0, 0, 0], mx: [0, 0, 0], leftFirst: 0, triCount: 0 });

  const nodeBuf = new ArrayBuffer(nodes.length * 32);
  const nf = new Float32Array(nodeBuf);
  const nu = new Uint32Array(nodeBuf);
  for (let i = 0; i < nodes.length; i++) {
    const o = i * 8;
    const nd = nodes[i];
    nf[o + 0] = nd.mn[0]; nf[o + 1] = nd.mn[1]; nf[o + 2] = nd.mn[2]; nu[o + 3] = nd.leftFirst >>> 0;
    nf[o + 4] = nd.mx[0]; nf[o + 5] = nd.mx[1]; nf[o + 6] = nd.mx[2]; nu[o + 7] = nd.triCount >>> 0;
  }
  const reordered = order.map((i) => tris[i]);
  return { nodeBuf, nodeCount: nodes.length, tris: reordered };
}

function packTriangles(tris) {
  const buf = new ArrayBuffer(Math.max(1, tris.length) * 96);
  const f = new Float32Array(buf);
  const u = new Uint32Array(buf);
  for (let i = 0; i < tris.length; i++) {
    const o = i * 24;
    const t = tris[i];
    f[o + 0] = t.v0[0]; f[o + 1] = t.v0[1]; f[o + 2] = t.v0[2];
    f[o + 4] = t.v1[0]; f[o + 5] = t.v1[1]; f[o + 6] = t.v1[2];
    f[o + 8] = t.v2[0]; f[o + 9] = t.v2[1]; f[o + 10] = t.v2[2]; u[o + 11] = t.matIdx >>> 0;
    f[o + 12] = t.n0[0]; f[o + 13] = t.n0[1]; f[o + 14] = t.n0[2];
    f[o + 16] = t.n1[0]; f[o + 17] = t.n1[1]; f[o + 18] = t.n1[2];
    f[o + 20] = t.n2[0]; f[o + 21] = t.n2[1]; f[o + 22] = t.n2[2];
  }
  return buf;
}

function packMaterials(mats) {
  const buf = new ArrayBuffer(Math.max(1, mats.length) * 48);
  const f = new Float32Array(buf);
  for (let i = 0; i < mats.length; i++) {
    const o = i * 12;
    const m = mats[i];
    f[o + 0] = m.baseColor[0]; f[o + 1] = m.baseColor[1]; f[o + 2] = m.baseColor[2]; f[o + 3] = m.metalness;
    f[o + 4] = m.emission[0]; f[o + 5] = m.emission[1]; f[o + 6] = m.emission[2]; f[o + 7] = m.roughness;
    f[o + 8] = m.transmission; f[o + 9] = m.ior;
  }
  return buf;
}

// ---------------------------------------------------------------------------
// GPU scene buffers
// ---------------------------------------------------------------------------
let bvhBuffer, triBuffer, matBuffer;

function uploadScene() {
  hStatus.textContent = 'building BVH';
  let bvh;
  try {
    bvh = buildBVH(triList);
  } catch (e) {
    hStatus.textContent = 'BVH error';
    console.error(e);
    return;
  }
  const triBuf = packTriangles(bvh.tris);
  const matBuf = packMaterials(materials.length ? materials : [{ baseColor: [0.8, 0.8, 0.8], metalness: 0, roughness: 1, emission: [0, 0, 0], transmission: 0, ior: 1.5 }]);

  if (bvhBuffer) bvhBuffer.destroy();
  if (triBuffer) triBuffer.destroy();
  if (matBuffer) matBuffer.destroy();

  bvhBuffer = device.createBuffer({ size: bvh.nodeBuf.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(bvhBuffer, 0, bvh.nodeBuf);
  triBuffer = device.createBuffer({ size: triBuf.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(triBuffer, 0, triBuf);
  matBuffer = device.createBuffer({ size: matBuf.byteLength, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(matBuffer, 0, matBuf);

  hStatus.textContent = `tris ${triList.length}`;
  rebuildComputeBindGroup();
  resetAccum();
}

// ---------------------------------------------------------------------------
// WGSL: compute path tracer
// ---------------------------------------------------------------------------
const computeWGSL = /* wgsl */`
struct Uniforms {
  invProj: mat4x4f,
  invView: mat4x4f,
  cameraPos: vec3f, frame: f32,
  width: u32, height: u32, bounces: u32, maxSamples: u32,
  envIntensity: f32, sunAzimuth: f32, sunElevation: f32, sunSize: f32,
  sunIntensity: f32, p0: f32, p1: f32, p2: f32,
  skyZenith: vec3f, p3: f32,
  skyHorizon: vec3f, p4: f32,
  groundColor: vec3f, p5: f32,
  sunColor: vec3f, p6: f32,
};

struct BVHNode { aabbMin: vec3f, leftFirst: u32, aabbMax: vec3f, triCount: u32 };
struct Triangle {
  v0: vec3f, pad0: f32,
  v1: vec3f, pad1: f32,
  v2: vec3f, matIdx: u32,
  n0: vec3f, pad3: f32,
  n1: vec3f, pad4: f32,
  n2: vec3f, pad5: f32,
};
struct Material {
  baseColor: vec3f, metalness: f32,
  emission: vec3f, roughness: f32,
  transmission: f32, ior: f32, mp0: f32, mp1: f32,
};

@group(0) @binding(0) var<uniform> uniforms: Uniforms;
@group(0) @binding(1) var<storage, read> bvhNodes: array<BVHNode>;
@group(0) @binding(2) var<storage, read> tris: array<Triangle>;
@group(0) @binding(3) var<storage, read> mats: array<Material>;
@group(0) @binding(4) var<storage, read_write> accum: array<vec4f>;
@group(0) @binding(5) var outTex: texture_storage_2d<rgba16float, write>;

const PI = 3.14159265359;
const EPS = 1e-4;

struct Ray { o: vec3f, d: vec3f, tmin: f32, tmax: f32 };
struct HitInfo { tri: i32, t: f32, u: f32, v: f32 };

fn pcg(v: u32) -> u32 {
  var s = v * 747796405u + 2891336453u;
  var w = ((s >> ((s >> 28u) + 4u)) ^ s) * 277803737u;
  return (w >> 22u) ^ w;
}
fn rand(seed: ptr<function,u32>) -> f32 {
  *seed = pcg(*seed);
  return f32(*seed) / 4294967296.0;
}
fn rand2(s: ptr<function,u32>) -> vec2f { return vec2f(rand(s), rand(s)); }

fn generateRay(px: vec2u, s: ptr<function,u32>) -> Ray {
  let jitter = rand2(s) - 0.5;
  let uv = (vec2f(px) + jitter + 0.5) / vec2f(f32(uniforms.width), f32(uniforms.height));
  let ndc = uv * 2.0 - 1.0;
  var clipPos = vec4f(ndc.x, -ndc.y, -1.0, 1.0);
  var viewDir4 = uniforms.invProj * clipPos;
  viewDir4 = vec4f(viewDir4.xyz / viewDir4.w, 0.0);
  let worldDir = normalize((uniforms.invView * viewDir4).xyz);
  return Ray(uniforms.cameraPos, worldDir, EPS, 1e30);
}

fn hitAABB(ray: Ray, mn: vec3f, mx: vec3f, t: f32) -> bool {
  let inv = 1.0 / ray.d;
  let t0 = (mn - ray.o) * inv;
  let t1 = (mx - ray.o) * inv;
  let tsm = min(t0, t1);
  let tbg = max(t0, t1);
  let tnear = max(max(tsm.x, tsm.y), tsm.z);
  let tfar = min(min(tbg.x, tbg.y), tbg.z);
  return tnear <= tfar && tfar >= ray.tmin && tnear <= t;
}

fn hitTriangle(ray: Ray, ti: u32, best: ptr<function,HitInfo>) {
  let tr = tris[ti];
  let e1 = tr.v1 - tr.v0;
  let e2 = tr.v2 - tr.v0;
  let p = cross(ray.d, e2);
  let det = dot(e1, p);
  if abs(det) < 1e-9 { return; }
  let invDet = 1.0 / det;
  let tv = ray.o - tr.v0;
  let u = dot(tv, p) * invDet;
  if u < 0.0 || u > 1.0 { return; }
  let q = cross(tv, e1);
  let v = dot(ray.d, q) * invDet;
  if v < 0.0 || u + v > 1.0 { return; }
  let t = dot(e2, q) * invDet;
  if t > ray.tmin && t < (*best).t {
    (*best).t = t; (*best).tri = i32(ti); (*best).u = u; (*best).v = v;
  }
}

fn intersect(ray: Ray) -> HitInfo {
  var best = HitInfo(-1, ray.tmax, 0.0, 0.0);
  var stack: array<u32, 32>;
  var sp = 0u;
  stack[sp] = 0u; sp = sp + 1u;
  loop {
    if sp == 0u { break; }
    sp = sp - 1u;
    let n = bvhNodes[stack[sp]];
    if !hitAABB(ray, n.aabbMin, n.aabbMax, best.t) { continue; }
    if n.triCount > 0u {
      for (var i = 0u; i < n.triCount; i = i + 1u) {
        hitTriangle(ray, n.leftFirst + i, &best);
      }
    } else {
      if sp < 30u {
        stack[sp] = n.leftFirst; sp = sp + 1u;
        stack[sp] = n.leftFirst + 1u; sp = sp + 1u;
      }
    }
  }
  return best;
}

fn buildBasis(n: vec3f) -> mat3x3f {
  var t: vec3f;
  if abs(n.x) > 0.1 { t = normalize(cross(vec3f(0.0,1.0,0.0), n)); }
  else { t = normalize(cross(vec3f(1.0,0.0,0.0), n)); }
  let b = cross(n, t);
  return mat3x3f(t, b, n);
}

fn cosineSample(n: vec3f, s: ptr<function,u32>) -> vec3f {
  let r = rand2(s);
  let phi = 2.0 * PI * r.x;
  let cosT = sqrt(1.0 - r.y);
  let sinT = sqrt(r.y);
  let local = vec3f(cos(phi) * sinT, sin(phi) * sinT, cosT);
  return buildBasis(n) * local;
}

fn ggxSample(n: vec3f, rough: f32, s: ptr<function,u32>) -> vec3f {
  let a = max(rough * rough, 1e-3);
  let r = rand2(s);
  let phi = 2.0 * PI * r.x;
  let cosT = sqrt((1.0 - r.y) / (1.0 + (a*a - 1.0) * r.y));
  let sinT = sqrt(max(0.0, 1.0 - cosT*cosT));
  let local = vec3f(cos(phi) * sinT, sin(phi) * sinT, cosT);
  return buildBasis(n) * local;
}

fn fresnelSchlick(cosT: f32, f0: vec3f) -> vec3f {
  let m = clamp(1.0 - cosT, 0.0, 1.0);
  return f0 + (vec3f(1.0) - f0) * (m*m*m*m*m);
}

fn sunDir() -> vec3f {
  let az = uniforms.sunAzimuth;
  let el = uniforms.sunElevation;
  return normalize(vec3f(cos(el) * cos(az), sin(el), cos(el) * sin(az)));
}

fn sky(dir: vec3f) -> vec3f {
  let cy = dir.y;
  var col: vec3f;
  if cy >= 0.0 {
    let t = pow(max(cy, 0.0), 0.45);
    col = mix(uniforms.skyHorizon, uniforms.skyZenith, t);
    let haze = exp(-cy*cy*120.0) * 0.25;
    col = col + uniforms.skyHorizon * haze;
  } else {
    let t = pow(max(-cy, 0.0), 0.5);
    col = mix(uniforms.skyHorizon, uniforms.groundColor, clamp(t*1.5, 0.0, 1.0));
  }
  let sd = sunDir();
  let c = dot(dir, sd);
  let size = max(uniforms.sunSize, 1e-3);
  let ang = acos(clamp(c, -1.0, 1.0));
  if ang < size {
    let limb = 1.0 - 0.6 * (ang / size);
    col = col + uniforms.sunColor * uniforms.sunIntensity * limb;
  } else {
    let glow = exp(-(ang - size) * 30.0) * 0.4;
    col = col + uniforms.sunColor * uniforms.sunIntensity * glow;
  }
  return max(col * uniforms.envIntensity, vec3f(0.0));
}

fn shadeNormal(h: HitInfo) -> vec3f {
  let tr = tris[h.tri];
  let w = 1.0 - h.u - h.v;
  var n = normalize(tr.n0 * w + tr.n1 * h.u + tr.n2 * h.v);
  let gn = normalize(cross(tr.v1 - tr.v0, tr.v2 - tr.v0));
  if dot(n, gn) < 0.0 { n = -n; }
  return n;
}

fn pathTrace(startRay: Ray, seed0: u32) -> vec3f {
  var ray = startRay;
  var s = seed0;
  var color = vec3f(0.0);
  var throughput = vec3f(1.0);

  for (var bounce = 0u; bounce < uniforms.bounces; bounce = bounce + 1u) {
    let h = intersect(ray);
    if h.tri < 0 {
      color = color + throughput * sky(ray.d);
      break;
    }
    let tr = tris[h.tri];
    let m = mats[tr.matIdx];
    let pos = ray.o + ray.d * h.t;
    let n = shadeNormal(h);

    color = color + throughput * m.emission;

    let V = -ray.d;

    if m.transmission > 0.5 {
      var nl = n;
      var eta: f32;
      let entering = dot(ray.d, n) < 0.0;
      if entering { nl = n; eta = 1.0 / m.ior; }
      else { nl = -n; eta = m.ior; }
      let cosI = -dot(ray.d, nl);
      let f0v = (m.ior - 1.0) / (m.ior + 1.0);
      let f0 = vec3f(f0v * f0v);
      let fres = fresnelSchlick(cosI, f0).x;
      let refr = refract(ray.d, nl, eta);
      if rand(&s) < fres || dot(refr, refr) < 1e-6 {
        let rdir = reflect(ray.d, nl);
        ray = Ray(pos + nl * EPS, rdir, EPS, 1e30);
      } else {
        throughput = throughput * m.baseColor;
        ray = Ray(pos - nl * EPS, normalize(refr), EPS, 1e30);
      }
    } else if m.metalness > 0.5 {
      let hN = ggxSample(n, m.roughness, &s);
      var rdir = reflect(ray.d, hN);
      if dot(rdir, n) < 0.0 { rdir = reflect(ray.d, n); }
      let f = fresnelSchlick(max(dot(V, hN), 0.0), m.baseColor);
      throughput = throughput * f;
      ray = Ray(pos + n * EPS, normalize(rdir), EPS, 1e30);
    } else {
      let f0 = mix(vec3f(0.04), m.baseColor, m.metalness);
      let specProb = clamp(max(f0.x, max(f0.y, f0.z)) + m.metalness, 0.05, 0.9);
      if rand(&s) < specProb {
        let hN = ggxSample(n, m.roughness, &s);
        var rdir = reflect(ray.d, hN);
        if dot(rdir, n) < 0.0 { rdir = reflect(ray.d, n); }
        let f = fresnelSchlick(max(dot(V, hN), 0.0), f0);
        throughput = throughput * f / specProb;
        ray = Ray(pos + n * EPS, normalize(rdir), EPS, 1e30);
      } else {
        let ndir = cosineSample(n, &s);
        throughput = throughput * m.baseColor / (1.0 - specProb);
        ray = Ray(pos + n * EPS, ndir, EPS, 1e30);
      }
    }

    if bounce > 2u {
      let p = max(throughput.x, max(throughput.y, throughput.z));
      if rand(&s) > p { break; }
      throughput = throughput / max(p, 1e-4);
    }
    throughput = clamp(throughput, vec3f(0.0), vec3f(20.0));
  }
  if !(color.x == color.x) || !(color.y == color.y) || !(color.z == color.z) {
    color = vec3f(0.0);
  }
  return clamp(color, vec3f(0.0), vec3f(64.0));
}

@compute @workgroup_size(8, 8)
fn main(@builtin(global_invocation_id) gid: vec3u) {
  if gid.x >= uniforms.width || gid.y >= uniforms.height { return; }
  let px = gid.xy;
  let pixIdx = px.x + px.y * uniforms.width;
  let frame = u32(uniforms.frame);
  var seed = px.x + px.y * uniforms.width + frame * uniforms.width * uniforms.height + 1u;

  let ray = generateRay(px, &seed);
  let c = pathTrace(ray, seed);

  let prev = accum[pixIdx];
  let nv = prev + vec4f(c, 1.0);
  accum[pixIdx] = nv;
  let outc = nv.rgb / max(nv.w, 1.0);
  textureStore(outTex, vec2i(px), vec4f(outc, 1.0));
}
`;

// ---------------------------------------------------------------------------
// WGSL: display (tone-map)
// ---------------------------------------------------------------------------
function buildDisplayWGSL(exposure) {
  return /* wgsl */`
@group(0) @binding(0) var srcTex: texture_2d<f32>;
@group(0) @binding(1) var srcSamp: sampler;
struct VSOut { @builtin(position) pos: vec4f, @location(0) uv: vec2f };

@vertex
fn vs(@builtin(vertex_index) vi: u32) -> VSOut {
  var p = array<vec2f,3>(vec2f(-1.0,-1.0), vec2f(3.0,-1.0), vec2f(-1.0,3.0));
  var o: VSOut;
  let xy = p[vi];
  o.pos = vec4f(xy, 0.0, 1.0);
  o.uv = vec2f((xy.x + 1.0) * 0.5, 1.0 - (xy.y + 1.0) * 0.5);
  return o;
}

fn aces(x: vec3f) -> vec3f {
  let a = 2.51; let b = 0.03; let c = 2.43; let d = 0.59; let e = 0.14;
  return clamp((x*(a*x+b))/(x*(c*x+d)+e), vec3f(0.0), vec3f(1.0));
}

@fragment
fn fs(in: VSOut) -> @location(0) vec4f {
  let hdr = textureSampleLevel(srcTex, srcSamp, in.uv, 0.0).rgb * ${exposure.toFixed(4)};
  let mapped = aces(hdr);
  let srgb = pow(mapped, vec3f(1.0/2.2));
  return vec4f(srgb, 1.0);
}
`;
}

// ---------------------------------------------------------------------------
// Pipelines
// ---------------------------------------------------------------------------
const computeModule = device.createShaderModule({ code: computeWGSL });
const computePipeline = device.createComputePipeline({
  layout: 'auto',
  compute: { module: computeModule, entryPoint: 'main' },
});

let displayPipeline, displayBindGroupLayout;
function buildDisplayPipeline(exposure) {
  const mod = device.createShaderModule({ code: buildDisplayWGSL(exposure) });
  displayPipeline = device.createRenderPipeline({
    layout: 'auto',
    vertex: { module: mod, entryPoint: 'vs' },
    fragment: { module: mod, entryPoint: 'fs', targets: [{ format }] },
    primitive: { topology: 'triangle-list' },
  });
  displayBindGroupLayout = displayPipeline.getBindGroupLayout(0);
}
buildDisplayPipeline(1.0);

const uniformBuffer = device.createBuffer({ size: 256, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });
const uF = new Float32Array(64);
const uU = new Uint32Array(uF.buffer);

// ---------------------------------------------------------------------------
// Resolution-dependent resources
// ---------------------------------------------------------------------------
let ptWidth = 1, ptHeight = 1;
let accumBuffer, outputTexture, computeBindGroup, displayBindGroup;
let frameCount = 0;
const sampler = device.createSampler({ magFilter: 'linear', minFilter: 'linear' });

function createPtResources(w, h) {
  ptWidth = Math.max(1, w | 0);
  ptHeight = Math.max(1, h | 0);
  if (accumBuffer) accumBuffer.destroy();
  if (outputTexture) outputTexture.destroy();
  accumBuffer = device.createBuffer({
    size: ptWidth * ptHeight * 16,
    usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
  });
  outputTexture = device.createTexture({
    size: [ptWidth, ptHeight],
    format: 'rgba16float',
    usage: GPUTextureUsage.STORAGE_BINDING | GPUTextureUsage.TEXTURE_BINDING,
  });
  rebuildComputeBindGroup();
  rebuildDisplayBindGroup();
  resetAccum();
}

function rebuildComputeBindGroup() {
  if (!accumBuffer || !outputTexture || !bvhBuffer) return;
  computeBindGroup = device.createBindGroup({
    layout: computePipeline.getBindGroupLayout(0),
    entries: [
      { binding: 0, resource: { buffer: uniformBuffer } },
      { binding: 1, resource: { buffer: bvhBuffer } },
      { binding: 2, resource: { buffer: triBuffer } },
      { binding: 3, resource: { buffer: matBuffer } },
      { binding: 4, resource: { buffer: accumBuffer } },
      { binding: 5, resource: outputTexture.createView() },
    ],
  });
}

function rebuildDisplayBindGroup() {
  if (!outputTexture) return;
  displayBindGroup = device.createBindGroup({
    layout: displayBindGroupLayout,
    entries: [
      { binding: 0, resource: outputTexture.createView() },
      { binding: 1, resource: sampler },
    ],
  });
}

function resetAccum() {
  frameCount = 0;
  if (accumBuffer) {
    device.queue.writeBuffer(accumBuffer, 0, new Float32Array(ptWidth * ptHeight * 4));
  }
}

// ---------------------------------------------------------------------------
// Params + GUI
// ---------------------------------------------------------------------------
const params = {
  bounces: 6,
  maxSamples: 1024,
  targetRes: 1.0,
  exposure: 1.0,
  envIntensity: 1.0,
  sunAzimuth: 0.7,
  sunElevation: 0.85,
  sunSize: 0.04,
  sunIntensity: 18.0,
  skyZenith: '#3a6dd0',
  skyHorizon: '#bcd2ee',
  groundColor: '#2a2c33',
  sunColor: '#fff2d6',
  preset: 'Balanced',
};

function hexToRgb(h) {
  const c = new THREE.Color(h);
  return [c.r, c.g, c.b];
}

const gui = new GUI({ title: 'Path Tracer' });
gui.add(params, 'preset', ['Fast', 'Balanced', 'Quality']).onChange(applyPreset);
function applyPreset(p) {
  if (p === 'Fast') { params.bounces = 3; params.targetRes = 0.75; }
  else if (p === 'Balanced') { params.bounces = 6; params.targetRes = 1.0; }
  else if (p === 'Quality') { params.bounces = 10; params.targetRes = 1.0; }
  gui.controllersRecursive().forEach((c) => c.updateDisplay());
  resize();
  resetAccum();
}

const fSky = gui.addFolder('Sun & Sky');
fSky.add(params, 'sunAzimuth', 0, 6.283).onChange(resetAccum);
fSky.add(params, 'sunElevation', -0.2, 1.55).onChange(resetAccum);
fSky.add(params, 'sunSize', 0.005, 0.3).name('softness').onChange(resetAccum);
fSky.add(params, 'sunIntensity', 0, 60).onChange(resetAccum);
fSky.add(params, 'envIntensity', 0, 3).onChange(resetAccum);
fSky.addColor(params, 'skyZenith').onChange(resetAccum);
fSky.addColor(params, 'skyHorizon').onChange(resetAccum);
fSky.addColor(params, 'groundColor').onChange(resetAccum);
fSky.addColor(params, 'sunColor').onChange(resetAccum);

const fRender = gui.addFolder('Render');
fRender.add(params, 'bounces', 1, 16, 1).onChange(resetAccum);
fRender.add(params, 'maxSamples', 16, 4096, 1);
fRender.add(params, 'targetRes', 0.25, 1.0, 0.05).onChange(() => { resize(); resetAccum(); });
fRender.add(params, 'exposure', 0.1, 4).onChange((v) => { buildDisplayPipeline(v); rebuildDisplayBindGroup(); });

const fObj = gui.addFolder('Objects');
fObj.add({ addSphere: () => {
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(1.0, 48, 32),
    new THREE.MeshStandardMaterial({ color: 0xffffff, metalness: 0.0, roughness: 0.3 }));
  mesh.position.set((Math.random() - 0.5) * 6, 1.0, (Math.random() - 0.5) * 6);
  scene.add(mesh); extractTriangles(mesh); uploadScene();
} }, 'addSphere').name('Add Sphere');
fObj.add({ addBox: () => {
  const mesh = new THREE.Mesh(new THREE.BoxGeometry(1.4, 1.4, 1.4),
    new THREE.MeshStandardMaterial({ color: 0xcc5577, metalness: 0.0, roughness: 0.4 }));
  mesh.position.set((Math.random() - 0.5) * 6, 0.7, (Math.random() - 0.5) * 6);
  scene.add(mesh); extractTriangles(mesh); uploadScene();
} }, 'addBox').name('Add Box');
fObj.add({ load: () => loadFile() }, 'load').name('Load OBJ/GLTF');

function loadFile() {
  const inp = document.createElement('input');
  inp.type = 'file';
  inp.accept = '.obj,.gltf,.glb';
  inp.onchange = () => {
    const file = inp.files[0];
    if (!file) return;
    const url = URL.createObjectURL(file);
    const ext = file.name.split('.').pop().toLowerCase();
    const onLoad = (obj) => {
      const root = obj.scene || obj;
      root.position.y += 1.0;
      scene.add(root);
      root.traverse((o) => { if (o.isMesh) extractTriangles(o); });
      uploadScene();
      URL.revokeObjectURL(url);
    };
    if (ext === 'obj') new OBJLoader().load(url, onLoad);
    else new GLTFLoader().load(url, onLoad);
  };
  inp.click();
}

// ---------------------------------------------------------------------------
// Resize / interaction
// ---------------------------------------------------------------------------
let lastInteractTime = 0;
controls.addEventListener('change', () => { lastInteractTime = Date.now(); resetAccum(); });

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const cw = Math.max(1, Math.floor(canvas.clientWidth * dpr));
  const ch = Math.max(1, Math.floor(canvas.clientHeight * dpr));
  canvas.width = cw; canvas.height = ch;
  camera.aspect = cw / ch;
  camera.updateProjectionMatrix();
  const scale = params.targetRes;
  const w = Math.max(1, Math.floor(cw * scale));
  const h = Math.max(1, Math.floor(ch * scale));
  if (w !== ptWidth || h !== ptHeight) createPtResources(w, h);
}
window.addEventListener('resize', resize);

// ---------------------------------------------------------------------------
// Uniform update
// ---------------------------------------------------------------------------
function updateUniforms(w, h) {
  camera.updateMatrixWorld(true);
  const invProj = camera.projectionMatrixInverse.elements;
  const invView = camera.matrixWorld.elements;
  for (let i = 0; i < 16; i++) uF[i] = invProj[i];
  for (let i = 0; i < 16; i++) uF[16 + i] = invView[i];
  uF[32] = camera.position.x; uF[33] = camera.position.y; uF[34] = camera.position.z;
  uF[35] = frameCount;
  uU[36] = w; uU[37] = h; uU[38] = params.bounces; uU[39] = params.maxSamples;
  uF[40] = params.envIntensity; uF[41] = params.sunAzimuth; uF[42] = params.sunElevation; uF[43] = params.sunSize;
  uF[44] = params.sunIntensity; uF[45] = 0; uF[46] = 0; uF[47] = 0;
  const sz = hexToRgb(params.skyZenith); uF[48] = sz[0]; uF[49] = sz[1]; uF[50] = sz[2]; uF[51] = 0;
  const sh = hexToRgb(params.skyHorizon); uF[52] = sh[0]; uF[53] = sh[1]; uF[54] = sh[2]; uF[55] = 0;
  const gc = hexToRgb(params.groundColor); uF[56] = gc[0]; uF[57] = gc[1]; uF[58] = gc[2]; uF[59] = 0;
  const sc = hexToRgb(params.sunColor); uF[60] = sc[0]; uF[61] = sc[1]; uF[62] = sc[2]; uF[63] = 0;
  device.queue.writeBuffer(uniformBuffer, 0, uF.buffer);
}

// ---------------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------------
let fpsT = performance.now(), fpsN = 0, fpsV = 0;

function frame() {
  requestAnimationFrame(frame);
  const interacting = (Date.now() - lastInteractTime) < 150;

  const wantScale = interacting ? 0.3 : params.targetRes;
  const cw = canvas.width, ch = canvas.height;
  const w = Math.max(1, Math.floor(cw * wantScale));
  const h = Math.max(1, Math.floor(ch * wantScale));
  if (w !== ptWidth || h !== ptHeight) createPtResources(w, h);

  controls.update();
  updateUniforms(ptWidth, ptHeight);

  const cmd = device.createCommandEncoder();

  if (frameCount < params.maxSamples && computeBindGroup) {
    const pass = cmd.beginComputePass();
    pass.setPipeline(computePipeline);
    pass.setBindGroup(0, computeBindGroup);
    pass.dispatchWorkgroups(Math.ceil(ptWidth / 8), Math.ceil(ptHeight / 8));
    pass.end();
    frameCount++;
  }

  if (displayBindGroup) {
    const rpass = cmd.beginRenderPass({
      colorAttachments: [{
        view: ctx.getCurrentTexture().createView(),
        loadOp: 'clear', storeOp: 'store', clearValue: { r: 0, g: 0, b: 0, a: 1 },
      }],
    });
    rpass.setPipeline(displayPipeline);
    rpass.setBindGroup(0, displayBindGroup);
    rpass.draw(3);
    rpass.end();
  }

  device.queue.submit([cmd.finish()]);

  fpsN++;
  const now = performance.now();
  if (now - fpsT > 500) { fpsV = Math.round(fpsN * 1000 / (now - fpsT)); fpsN = 0; fpsT = now; }
  hSpp.textContent = frameCount;
  hFps.textContent = fpsV;
  hRes.textContent = `${ptWidth}x${ptHeight}`;
  if (frameCount >= params.maxSamples) hStatus.textContent = 'converged';
  else if (interacting) hStatus.textContent = 'preview';
  else hStatus.textContent = 'rendering';
}

// ---------------------------------------------------------------------------
// Boot
// ---------------------------------------------------------------------------
buildDefaultScene();
resize();
uploadScene();
createPtResources(ptWidth, ptHeight);
requestAnimationFrame(frame);
</script>
</body>
</html>
