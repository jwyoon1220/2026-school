<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정투상도로 등각투상도 그리기 연습</title>
    <style>
        :root {
            --primary-color: #3498db;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f8f9fa;
            --grid-border: #bdc3c7;
            --block-color: #2c3e50;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        p.desc {
            color: #666;
            margin-bottom: 20px;
            text-align: center;
            line-height: 1.5;
        }

        .app-container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 900px;
            width: 100%;
        }

        .section-title {
            width: 100%;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: var(--primary-color);
            font-weight: bold;
            font-size: 18px;
        }

        /* 문제: 정투상도 영역 */
        .question-area {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 40px;
            margin-bottom: 40px;
        }

        .view-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .view-box h3 {
            font-size: 15px;
            margin: 0 0 10px 0;
            color: #555;
        }

        /* 3x3 읽기 전용 그리드 (문제 표시용) */
        .static-grid {
            display: grid;
            grid-template-columns: repeat(3, 30px);
            grid-template-rows: repeat(3, 30px);
            gap: 1px;
            background-color: var(--grid-border);
            border: 2px solid var(--grid-border);
        }

        .static-cell {
            width: 30px;
            height: 30px;
            background-color: white;
        }
        .static-cell.filled {
            background-color: var(--block-color);
        }

        /* 답변: 등각투상도 입력 영역 */
        .answer-area {
            display: flex;
            gap: 40px;
            align-items: flex-start;
            margin-bottom: 30px;
            width: 100%;
            justify-content: center;
        }

        .input-panel {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-panel p {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        /* 3x3 인터랙티브 높이 입력 그리드 */
        .interactive-grid {
            display: grid;
            grid-template-columns: repeat(3, 50px);
            grid-template-rows: repeat(3, 50px);
            gap: 2px;
            background-color: #ccc;
            border: 3px solid #ccc;
            border-radius: 4px;
        }

        .interactive-cell {
            width: 50px;
            height: 50px;
            background-color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.2s;
        }

        .interactive-cell:hover { background-color: #ecf0f1; }
        .interactive-cell[data-h="1"] { background-color: #d6eaf8; color: #2980b9; }
        .interactive-cell[data-h="2"] { background-color: #85c1e9; color: #1f618d; }
        .interactive-cell[data-h="3"] { background-color: #3498db; color: white; }

        canvas {
            background-color: #f1f2f6;
            border: 1px solid #dfe4ea;
            border-radius: 8px;
        }

        .controls {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        button {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        button:active { transform: scale(0.96); }
        button:hover { opacity: 0.9; }

        #btn-generate { background-color: #7f8c8d; }
        #btn-evaluate { background-color: var(--success-color); }

        #result-message {
            font-size: 18px;
            font-weight: bold;
            min-height: 27px;
        }

        .correct { color: var(--success-color); }
        .incorrect { color: var(--danger-color); }

    </style>
</head>
<body>

    <h1>정투상도로 등각투상도 그리기</h1>
    <p class="desc">
        제시된 정투상도(평면도, 정면도, 우측면도)를 보고 입체 모양을 유추하세요.<br>
        바닥 그리드의 칸을 클릭하여 블록을 쌓아 올리면(최대 3층), 실시간으로 등각투상도가 그려집니다.
    </p>

    <div class="app-container">
        
        <div class="section-title">1. 문제 (정투상도)</div>
        <div class="question-area">
            <div class="view-box">
                <h3>평면도 (위)</h3>
                <div id="target-top" class="static-grid"></div>
            </div>
            <div class="view-box">
                <h3>정면도 (앞)</h3>
                <div id="target-front" class="static-grid"></div>
            </div>
            <div class="view-box">
                <h3>우측면도 (오른쪽)</h3>
                <div id="target-right" class="static-grid"></div>
            </div>
        </div>

        <div class="section-title">2. 내 답변 (등각투상도 그리기)</div>
        <div class="answer-area">
            <div class="input-panel">
                <p>바닥의 각 칸을 클릭해<br>높이(0~3)를 설정하세요.</p>
                <div id="user-grid" class="interactive-grid"></div>
            </div>
            
            <canvas id="iso-canvas" width="400" height="300"></canvas>
        </div>

        <div class="controls">
            <button id="btn-generate">새로운 문제 생성</button>
            <button id="btn-evaluate">정답 확인하기</button>
        </div>

        <div id="result-message"></div>
    </div>

    <script>
        // z: 깊이(0=뒤, 2=앞), x: 너비(0=왼, 2=오른)
        let targetShape = []; 
        let userShape = [[0,0,0], [0,0,0], [0,0,0]];

        window.onload = () => {
            initUserGrid();
            generateProblem();

            document.getElementById('btn-generate').addEventListener('click', generateProblem);
            document.getElementById('btn-evaluate').addEventListener('click', evaluate);
        };

        // 사용자 입력용 3x3 그리드 초기화
        function initUserGrid() {
            const container = document.getElementById('user-grid');
            container.innerHTML = '';
            for (let z = 0; z < 3; z++) {
                for (let x = 0; x < 3; x++) {
                    const cell = document.createElement('div');
                    cell.className = 'interactive-cell';
                    cell.dataset.z = z;
                    cell.dataset.x = x;
                    cell.dataset.h = 0;
                    cell.innerText = '0';
                    
                    cell.addEventListener('click', () => {
                        let h = parseInt(cell.dataset.h);
                        h = (h + 1) % 4; // 0 -> 1 -> 2 -> 3 -> 0 순환
                        cell.dataset.h = h;
                        cell.innerText = h > 0 ? h : '';
                        userShape[z][x] = h;
                        
                        document.getElementById('result-message').innerText = ''; // 메시지 초기화
                        drawIsometric(); // 즉시 캔버스 업데이트
                    });
                    container.appendChild(cell);
                }
            }
        }

        // 새로운 문제(목표 형태) 무작위 생성
        function generateProblem() {
            targetShape = [];
            let blockCount = 0;

            for (let z = 0; z < 3; z++) {
                let row = [];
                for (let x = 0; x < 3; x++) {
                    let h = Math.random() > 0.4 ? Math.floor(Math.random() * 3) + 1 : 0;
                    row.push(h);
                    blockCount += h;
                }
                targetShape.push(row);
            }

            // 블록이 너무 적으면 기본 블록 보장
            if (blockCount < 4) {
                targetShape[1][1] = 2;
                targetShape[2][1] = 1;
                targetShape[1][0] = 1;
            }

            renderTargetProjections();
            
            // 사용자 입력 초기화
            userShape = [[0,0,0], [0,0,0], [0,0,0]];
            document.querySelectorAll('.interactive-cell').forEach(cell => {
                cell.dataset.h = 0;
                cell.innerText = '';
            });
            document.getElementById('result-message').innerText = '';
            drawIsometric();
        }

        // 형태 배열을 바탕으로 2D 투상도 데이터를 계산하는 함수
        function calculateProjections(shapeArr) {
            const top = [[0,0,0], [0,0,0], [0,0,0]];
            const front = [[0,0,0], [0,0,0], [0,0,0]];
            const right = [[0,0,0], [0,0,0], [0,0,0]];

            // 평면도 (Top View)
            for (let z = 0; z < 3; z++) {
                for (let x = 0; x < 3; x++) {
                    top[z][x] = shapeArr[z][x] > 0 ? 1 : 0;
                }
            }

            // 정면도 (Front View)
            for (let x = 0; x < 3; x++) {
                let maxH = 0;
                for (let z = 0; z < 3; z++) {
                    maxH = Math.max(maxH, shapeArr[z][x]);
                }
                for (let h = 0; h < maxH; h++) {
                    front[2 - h][x] = 1; // 2-h : 바닥부터 채우기
                }
            }

            // 우측면도 (Right View)
            for (let z = 0; z < 3; z++) {
                let maxH = 0;
                for (let x = 0; x < 3; x++) {
                    maxH = Math.max(maxH, shapeArr[z][x]);
                }
                // 오른쪽에서 보므로, 깊이 z=2(앞)가 도면의 왼쪽(열 0)이 됨
                let col = 2 - z; 
                for (let h = 0; h < maxH; h++) {
                    right[2 - h][col] = 1;
                }
            }

            return { top, front, right };
        }

        // 정답(목표) 정투상도를 화면에 그리기
        function renderTargetProjections() {
            const views = calculateProjections(targetShape);
            
            const drawGrid = (containerId, data) => {
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                for (let r = 0; r < 3; r++) {
                    for (let c = 0; c < 3; c++) {
                        const cell = document.createElement('div');
                        cell.className = 'static-cell';
                        if (data[r][c] === 1) cell.classList.add('filled');
                        container.appendChild(cell);
                    }
                }
            };

            drawGrid('target-top', views.top);
            drawGrid('target-front', views.front);
            drawGrid('target-right', views.right);
        }

        // 사용자가 구성한 입체를 등각투상도로 캔버스에 실시간 렌더링
        function drawIsometric() {
            const canvas = document.getElementById('iso-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const size = 32;
            const startX = canvas.width / 2;
            const startY = 90; 

            const dx = size * 0.866;
            const dy = size * 0.5;

            // 뒤(z=0)에서 앞(z=2)으로 렌더링하여 겹침 처리
            for (let z = 0; z <= 2; z++) {
                for (let x = 0; x <= 2; x++) {
                    let h = userShape[z][x];
                    for (let y = 0; y < h; y++) {
                        let screenX = startX + (x - z) * dx;
                        let screenY = startY + (x + z) * dy - (y * size);
                        drawCube(ctx, screenX, screenY, size, dx, dy);
                    }
                }
            }
        }

        function drawCube(ctx, x, y, size, dx, dy) {
            ctx.lineWidth = 1.5;
            ctx.strokeStyle = '#2c3e50';
            ctx.lineJoin = 'round';

            // 윗면
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x + dx, y + dy);
            ctx.lineTo(x, y + dy * 2);
            ctx.lineTo(x - dx, y + dy);
            ctx.closePath();
            ctx.fillStyle = '#ecf0f1';
            ctx.fill(); ctx.stroke();

            // 왼쪽면
            ctx.beginPath();
            ctx.moveTo(x - dx, y + dy);
            ctx.lineTo(x, y + dy * 2);
            ctx.lineTo(x, y + dy * 2 + size);
            ctx.lineTo(x - dx, y + dy + size);
            ctx.closePath();
            ctx.fillStyle = '#bdc3c7';
            ctx.fill(); ctx.stroke();

            // 오른쪽면
            ctx.beginPath();
            ctx.moveTo(x, y + dy * 2);
            ctx.lineTo(x + dx, y + dy);
            ctx.lineTo(x + dx, y + dy + size);
            ctx.lineTo(x, y + dy * 2 + size);
            ctx.closePath();
            ctx.fillStyle = '#95a5a6';
            ctx.fill(); ctx.stroke();
        }

        // 정답 평가
        function evaluate() {
            // 사용자가 만든 입체의 투상도를 계산
            const userViews = calculateProjections(userShape);
            // 문제의 투상도를 계산
            const targetViews = calculateProjections(targetShape);

            // 보이지 않는 숨겨진 블록이 있을 수 있으므로, 투상도 3개가 모두 동일하게 나오면 정답으로 인정
            const isMatch = (arr1, arr2) => {
                for (let r=0; r<3; r++) {
                    for (let c=0; c<3; c++) {
                        if (arr1[r][c] !== arr2[r][c]) return false;
                    }
                }
                return true;
            };

            const topMatch = isMatch(targetViews.top, userViews.top);
            const frontMatch = isMatch(targetViews.front, userViews.front);
            const rightMatch = isMatch(targetViews.right, userViews.right);

            const msgEl = document.getElementById('result-message');
            
            if (topMatch && frontMatch && rightMatch) {
                msgEl.innerText = '🎉 완벽합니다! 제시된 정투상도와 정확히 일치하는 입체입니다.';
                msgEl.className = 'correct';
            } else {
                msgEl.innerText = '❌ 입체의 모양이 제시된 정투상도와 다릅니다. 높이나 위치를 다시 확인해보세요.';
                msgEl.className = 'incorrect';
            }
        }
    </script>
</body>
</html>
