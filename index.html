<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>GPU Path Tracer — Data-Oriented</title>
    <style>
        body { margin: 0; overflow: hidden; background:#0a0a0c; font-family: ui-sans-serif, system-ui, sans-serif; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 14px; left: 16px; color:#fff; z-index: 10; pointer-events:none;
              text-shadow: 0 1px 3px rgba(0,0,0,.6); }
        #ui h2 { margin:0 0 2px; font-weight:600; letter-spacing:.3px; font-size:18px; }
        #ui p  { margin:0; font-size:13px; opacity:.85; font-variant-numeric: tabular-nums; }
        #ui .hint { margin-top:6px; font-size:12px; opacity:.6; }
    </style>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three/examples/jsm/": "https://unpkg.com/three@0.160.0/examples/jsm/",
                "three-mesh-bvh": "https://unpkg.com/three-mesh-bvh@0.7.0/build/index.module.js",
                "three-gpu-pathtracer": "https://unpkg.com/three-gpu-pathtracer@0.0.21/build/index.module.js",
                "lil-gui": "https://unpkg.com/lil-gui@0.19.1/dist/lil-gui.esm.min.js"
            }
        }
    </script>
</head>
<body>
    <div id="ui">
        <h2>Web GPU Raytracer</h2>
        <p id="samples-info">Samples: 0</p>
        <p class="hint">클릭: 오브젝트 선택 · 기즈모로 이동</p>
    </div>
    <input type="file" id="model-file-input" accept=".obj,.gltf,.glb" style="display:none">

    <script type="module" src="./js/main.js?v=4"></script>
</body>
</html>
